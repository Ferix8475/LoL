<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>League of Legends Data</title>
</head>
<body>
    <h1>Enter Champion Name and Role</h1>
    <form action="/champion" method="post">
        <input type="text" name="champion" placeholder="Champion" required>
        <select name="role" required>
            {% for role in roles %}
            <option value="{{ role }}">{{ role }}</option>
            {% endfor %}
        </select>
        <input type="submit" value="Submit">
    </form>
</body>
</html>
